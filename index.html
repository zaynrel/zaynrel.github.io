<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FIF Simulasi Kredit Motor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="brand-pill">Team Eep</div>
      <h1 class="app-title">Simulasi<br><span>Kredit Motor</span></h1>
      <p class="app-subtitle">Bandung Raya · April 2026</p>
    </div>
    <div class="header-deco"></div>
  </header>

  <main class="app-main">

    <!-- FORM CARD -->
    <section class="form-card">

      <!-- Motor selection -->
      <div class="field-group">
        <label class="field-label" for="motor-select">
          <span class="label-num">01</span> Pilih Motor
        </label>
        <div class="select-wrapper">
          <select id="motor-select" class="field-select">
            <option value="">-- Pilih tipe motor --</option>
          </select>
          <span class="select-arrow">↓</span>
        </div>
        <div id="otr-badge" class="otr-badge hidden">
          OTR: <strong id="otr-value">-</strong>
        </div>
      </div>

      <!-- Tenor selection -->
      <div class="field-group" id="tenor-group" style="display:none">
        <label class="field-label">
          <span class="label-num">02</span> Pilih Tenor
        </label>
        <div id="tenor-buttons" class="tenor-grid"></div>
      </div>

      <!-- DP input -->
      <div class="field-group" id="dp-group" style="display:none">
        <label class="field-label" for="dp-input">
          <span class="label-num">03</span> Uang Muka (DP)
        </label>
        <div class="dp-input-wrapper">
          <span class="rp-prefix">Rp</span>
          <input
            type="text"
            id="dp-input"
            class="field-input"
            inputmode="numeric"
            placeholder="0"
            autocomplete="off"
          />
        </div>
        <div id="dp-range-hint" class="dp-hint"></div>
        <div id="dp-error" class="dp-error hidden">⚠ DP di luar rentang tersedia</div>
      </div>

      <button id="simulate-btn" class="simulate-btn hidden">
        Hitung Angsuran →
      </button>

    </section>

    <!-- RESULT CARD -->
    <section id="result-card" class="result-card hidden">
      <div class="result-header">
        <span class="result-tag">Hasil Simulasi</span>
      </div>

      <div class="result-motor-name" id="res-motor"></div>

      <div class="result-grid">
        <div class="res-block">
          <div class="res-label">Uang Muka</div>
          <div class="res-value" id="res-dp">-</div>
          <div class="res-note" id="res-dp-note"></div>
        </div>
        <div class="res-block accent">
          <div class="res-label">Angsuran / Bulan</div>
          <div class="res-value big" id="res-installment">-</div>
        </div>
        <div class="res-block">
          <div class="res-label">Tenor</div>
          <div class="res-value" id="res-tenor">-</div>
        </div>
        <div class="res-block">
          <div class="res-label">OTR</div>
          <div class="res-value" id="res-otr">-</div>
        </div>
      </div>

      <div class="result-footer">
        <div class="result-total-block">
          <span class="res-label">Total Bayar</span>
          <span class="res-total" id="res-total">-</span>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn">← Hitung Ulang</button>
    </section>

  </main>

  <footer class="app-footer">
    Data resmi FIF Group · Hanya untuk simulasi
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
